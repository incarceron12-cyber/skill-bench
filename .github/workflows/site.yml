name: Build and deploy research website

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/build_site_content.py'
      - 'PROJECT_CHARTER.md'
      - 'docs/**'
      - 'papers/**'
      - 'data/work_queue.json'
      - '.github/workflows/site.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'scripts/build_site_content.py'
      - 'PROJECT_CHARTER.md'
      - 'docs/**'
      - 'papers/**'
      - 'data/work_queue.json'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  SITE_URL: https://incarceron12-cyber.github.io
  SITE_BASE: /skill-bench

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate canonical sources
        run: |
          python -m py_compile scripts/*.py
          python scripts/check_review_quality.py papers --allow-empty
          python scripts/queue.py validate

      - name: Install website dependencies
        working-directory: site
        run: npm ci

      - name: Build static website
        working-directory: site
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
